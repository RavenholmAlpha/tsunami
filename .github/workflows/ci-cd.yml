name: TSUNAMI CI/CD

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  # ── Stage 1: Quality Gate ────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'
        cache: true

    - name: Verify go.mod is tidy
      run: |
        go mod tidy
        if ! git diff --quiet go.mod go.sum; then
          echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
          git diff go.mod go.sum
          exit 1
        fi

    - name: Vet
      run: go vet ./...

    - name: golangci-lint
      run: |
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        golangci-lint run --timeout=5m ./...

    - name: Shellcheck
      run: shellcheck scripts/install.sh

  # ── Stage 2: Test ────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'
        cache: true

    - name: Download Dependencies
      run: go mod download

    - name: Unit Tests
      run: go test -v -count=1 -race -timeout 5m -coverprofile=coverage.out ./pkg/...

    - name: Integration Tests
      run: go test -v -count=1 -timeout 5m ./tests/...

    - name: Verify Build
      run: |
        go build -o /dev/null ./cmd/tsunami-server/
        go build -o /dev/null ./cmd/tsunami-client/

    - name: Upload Coverage
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: codecov/codecov-action@v4
      with:
        files: coverage.out
        fail_ci_if_error: false
      continue-on-error: true

  # ── Stage 3: Security ───────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'
        cache: true

    - name: Govulncheck
      continue-on-error: true  # Advisory — stdlib vulns are fixed by building with latest Go
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

  # ── Stage 4: Cross-compile + Release ─────────────────────────────────
  release:
    name: Release
    needs: [ test, security ]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0   # needed for git describe

    - uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'
        cache: true

    - name: Build All Platforms
      run: |
        VERSION="${GITHUB_REF_NAME}"
        COMMIT="${GITHUB_SHA::8}"
        BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildTime=${BUILD_TIME}"

        TARGETS="linux/amd64 linux/arm64 windows/amd64 darwin/amd64 darwin/arm64"

        for target in $TARGETS; do
          GOOS="${target%/*}"
          GOARCH="${target#*/}"
          EXT=""; [ "$GOOS" = "windows" ] && EXT=".exe"
          DIR="dist/${VERSION}"

          mkdir -p "$DIR"

          echo "::group::Building ${GOOS}/${GOARCH}"
          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build -trimpath -ldflags="${LDFLAGS}" \
            -o "$DIR/tsunami-server-${GOOS}-${GOARCH}${EXT}" ./cmd/tsunami-server/

          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build -trimpath -ldflags="${LDFLAGS}" \
            -o "$DIR/tsunami-client-${GOOS}-${GOARCH}${EXT}" ./cmd/tsunami-client/
          echo "::endgroup::"
        done

    - name: Package Archives
      run: |
        VERSION="${GITHUB_REF_NAME}"
        DIR="dist/${VERSION}"
        ARCHIVES="dist/archives"
        mkdir -p "$ARCHIVES"

        cd "$DIR"

        for pair in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
          GOOS="${pair%%-*}"
          GOARCH="${pair##*-}"
          ARCHIVE="tsunami-${VERSION}-${pair}.tar.gz"
          tar -czvf "../../${ARCHIVES}/${ARCHIVE}" \
            "tsunami-server-${GOOS}-${GOARCH}" \
            "tsunami-client-${GOOS}-${GOARCH}"
          echo "Packaged: $ARCHIVE"
        done

        ARCHIVE="tsunami-${VERSION}-windows-amd64.zip"
        zip "../../${ARCHIVES}/${ARCHIVE}" \
          tsunami-server-windows-amd64.exe \
          tsunami-client-windows-amd64.exe
        echo "Packaged: $ARCHIVE"

    - name: Generate Checksums
      run: |
        cd dist/archives
        sha256sum *.tar.gz *.zip > checksums.sha256
        cat checksums.sha256

    - name: Verify Archives
      run: |
        echo "::group::Archive contents"
        for f in dist/archives/*.tar.gz; do
          echo "--- $f ---"
          tar -tzf "$f"
        done
        for f in dist/archives/*.zip; do
          echo "--- $f ---"
          unzip -l "$f"
        done
        echo "::endgroup::"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/archives/*.tar.gz
          dist/archives/*.zip
          dist/archives/checksums.sha256
        generate_release_notes: true
