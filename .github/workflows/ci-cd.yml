name: TSUNAMI CI/CD

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  # ── Stage 1: Lint + Test ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'
        cache: true

    - name: Download Dependencies
      run: go mod download

    - name: Vet
      run: go vet ./...

    - name: Unit Tests
      run: go test -v -count=1 -race -timeout 5m ./pkg/...

    - name: Integration Tests
      run: go test -v -count=1 -timeout 5m ./tests/...
      continue-on-error: true   # TODO: remove once all integration tests pass

    - name: Verify Build
      run: |
        go build -o /dev/null ./cmd/tsunami-server/
        go build -o /dev/null ./cmd/tsunami-client/

  # ── Stage 2: Cross-compile + Release ─────────────────────────────────
  release:
    name: Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0   # needed for git describe

    - uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'
        cache: true

    - name: Build All Platforms
      run: |
        VERSION="${GITHUB_REF_NAME}"
        COMMIT="${GITHUB_SHA::8}"
        BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildTime=${BUILD_TIME}"

        TARGETS="linux/amd64 linux/arm64 windows/amd64 darwin/amd64 darwin/arm64"

        for target in $TARGETS; do
          GOOS="${target%/*}"
          GOARCH="${target#*/}"
          EXT=""; [ "$GOOS" = "windows" ] && EXT=".exe"
          DIR="dist/${VERSION}"

          mkdir -p "$DIR"

          echo "::group::Building ${GOOS}/${GOARCH}"
          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build -trimpath -ldflags="${LDFLAGS}" \
            -o "$DIR/tsunami-server-${GOOS}-${GOARCH}${EXT}" ./cmd/tsunami-server/

          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build -trimpath -ldflags="${LDFLAGS}" \
            -o "$DIR/tsunami-client-${GOOS}-${GOARCH}${EXT}" ./cmd/tsunami-client/
          echo "::endgroup::"
        done

    - name: Package Archives
      run: |
        VERSION="${GITHUB_REF_NAME}"
        DIR="dist/${VERSION}"
        cd "$DIR"

        for pair in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
          ARCHIVE="tsunami-${VERSION}-${pair}.tar.gz"
          tar -czvf "$ARCHIVE" tsunami-*-${pair}
          echo "Packaged: $ARCHIVE"
        done

        ARCHIVE="tsunami-${VERSION}-windows-amd64.zip"
        zip "$ARCHIVE" tsunami-*-windows-amd64.exe
        echo "Packaged: $ARCHIVE"

    - name: Generate Checksums
      run: |
        VERSION="${GITHUB_REF_NAME}"
        DIR="dist/${VERSION}"
        cd "$DIR"
        sha256sum *.tar.gz *.zip > checksums.sha256
        cat checksums.sha256

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/${{ github.ref_name }}/*.tar.gz
          dist/${{ github.ref_name }}/*.zip
          dist/${{ github.ref_name }}/checksums.sha256
        generate_release_notes: true
